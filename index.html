<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>r/place 2</title>
  <script>
    const p = new URLSearchParams(location.search);
    const b = p.get("backend") || "r-place-2.onrender.com";
    const proto = p.get("protocol");
    let qs = "?backend=" + encodeURIComponent(b);
    if (proto) qs += "&protocol=" + encodeURIComponent(proto);
    location.replace("/canvas.html" + qs);
  </script>
</head>
<body>
  <p style="color:#888;font-family:sans-serif;padding:2em">Weiterleitung nach r/place 2...</p>
</body>
</html>
